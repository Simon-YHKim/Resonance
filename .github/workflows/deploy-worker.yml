name: Deploy Worker

# Cloudflare Worker 자동 배포.
#
# - main push 시에만 production 배포 (resonance-worker.<account>.workers.dev)
# - PR/feature branch 는 typecheck + test 만
# - D1 migration 은 자동 적용 (--remote)
#
# 필요 secrets:
#   CLOUDFLARE_API_TOKEN       — User API Token (Workers:Edit + D1:Edit 스코프)
#   CLOUDFLARE_ACCOUNT_ID
#   CLOUDFLARE_D1_DATABASE_ID  — wrangler d1 list 로 확인 (resonance-d1)
#   GEMINI_API_KEY             — Gemini Flash-Lite 키 (wrangler secret put 으로도 OK)
#
# 보안 — Global API Key 는 GitHub Secret 에 넣지 마세요. User API Token 만.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (worker + shared)
        run: pnpm test

      # wrangler.toml database_id placeholder 가드
      - name: PLACEHOLDER 가드
        run: |
          if grep -q "PLACEHOLDER_RUN_WRANGLER_D1_CREATE" apps/worker/wrangler.toml; then
            echo "::warning::wrangler.toml database_id is PLACEHOLDER. Substituting from secret."
          fi
          # CI 시점에 secret 으로 치환
          sed -i "s|PLACEHOLDER_RUN_WRANGLER_D1_CREATE|${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}|g" apps/worker/wrangler.toml

      - name: D1 migrations apply (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: d1 migrations apply resonance-d1 --remote

      - name: Worker deploy (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          secrets: |
            GEMINI_API_KEY
          command: deploy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
