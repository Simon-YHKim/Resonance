openapi: 3.0.3
info:
  title: 잔향(Resonance) Worker API
  description: |
    LLM 기반 GPS 텍스트 RPG 잔향의 Cloudflare Worker.
    Phase 1: 닉네임 분석 + user_wiki 컨텍스트.
  version: 1.0.0-phase1
  contact:
    name: Simon-YHKim
    url: https://github.com/Simon-YHKim/Resonance

servers:
  - url: http://localhost:8787
    description: 로컬 개발 (wrangler dev)
  - url: https://resonance-worker.<account>.workers.dev
    description: 프로덕션 (Cloudflare)

paths:
  /api/health:
    get:
      summary: 헬스체크
      tags: [Health]
      responses:
        '200':
          description: 워커 활성
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string, example: resonance-worker }
                  phase: { type: integer, example: 1 }
                  status: { type: string, example: live }
                  endpoints: { type: array, items: { type: string } }

  /api/character/analyze:
    post:
      summary: 닉네임 → user_wiki 분석·저장
      description: |
        닉네임을 LLM (Claude Haiku 4.5) 으로 분석해 user_wiki 에 저장.
        ANTHROPIC_API_KEY 미설정 시 자동 Mock fallback.

        rate limit: 사용자당 시간당 5회.
      tags: [Character]
      security:
        - DevUserId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickname]
              properties:
                nickname:
                  type: string
                  minLength: 1
                  maxLength: 20
                  description: 한글·영문·숫자·공백·언더스코어·하이픈만 허용
                  example: 회사다니기싫은김대리
      responses:
        '200':
          description: 분석 + 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeSuccess'
        '400':
          description: 잘못된 입력
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_nickname:
                  value: { success: false, error: 닉네임은 1~20자여야 합니다., code: INVALID_NICKNAME }
                invalid_body:
                  value: { success: false, error: JSON body 가 필요합니다., code: INVALID_BODY }
        '401':
          description: 인증 없음 (X-Dev-User-Id 헤더 누락)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: rate limit 초과 (시간당 5회)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      retry_after_ms: { type: integer }
        '500':
          description: LLM 호출 실패 (fallback 미설정 시)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/character/wiki:
    get:
      summary: 현재 사용자의 user_wiki 조회
      tags: [Character]
      security:
        - DevUserId: []
      responses:
        '200':
          description: wiki 존재
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  user_wiki:
                    type: object
                    properties:
                      user_id: { type: string }
                      nickname_analysis: { $ref: '#/components/schemas/NicknameAnalysis' }
                      milestones: { type: array }
                      gaehwa_axis: { type: integer }
                      yeojeon_axis: { type: integer }
                      hangno_axis: { type: integer }
                      axis_locked_at: { type: integer, nullable: true }
                      created_at: { type: integer }
                      updated_at: { type: integer }
        '401':
          description: 인증 없음
        '404':
          description: wiki 없음 (analyze 먼저 호출 필요)

components:
  securitySchemes:
    DevUserId:
      description: |
        Phase 1 placeholder. 헤더 X-Dev-User-Id 에 user_id 직접 입력.
        Phase 1.5 에서 Clerk JWT (Authorization: Bearer ...) 로 교체.
      type: apiKey
      in: header
      name: X-Dev-User-Id

  schemas:
    NicknameAnalysis:
      description: |
        wire format 한국어 키 (옵션 4-C).
        TS 코드 내부는 NicknameAnalysisAlias 영문 alias 사용.
      type: object
      required:
        - nickname
        - category
        - 추정직업
        - 추정연령
        - 추정환경
        - 정서적결
        - 주요키워드
        - 스토리매칭
        - 거점NPC말투
        - the_Voice_호칭
      properties:
        nickname:
          type: string
          maxLength: 20
        category:
          type: string
          enum: [A, B, C, D, E, F, G, H]
          description: |
            A 가족 호칭 / B 보편 한국 이름 / C 실명 변형 /
            D 위험 단어 / E 욕설 / F 정치인·종교 / G 타 IP / H 안전 다양
        추정직업:
          type: string
          example: 직장인
        추정연령:
          type: string
          example: 30대
        추정환경:
          type: string
          example: 사무실
        정서적결:
          type: string
          example: 지친
        주요키워드:
          type: array
          items: { type: string }
          minItems: 1
          maxItems: 10
        스토리매칭:
          type: object
          required:
            - 보스1자리
            - 보스1회상
            - 보스2자리
            - 보스3자리
            - 보스4자리
            - 보스5자리
          properties:
            보스1자리: { type: string, description: "남겨진 거인 (30~40대 직장)" }
            보스1회상: { type: string }
            보스2자리: { type: string, description: "흐르는 그림자 (20대 사랑)" }
            보스3자리: { type: string, description: "미루는 학자 (17~19세 꿈)" }
            보스4자리: { type: string, description: "떠난 친구들 (8~12세 우정)" }
            보스5자리: { type: string, description: "원의 아이 (5~7세 첫 자기)" }
        거점NPC말투:
          type: object
          additionalProperties: { type: string }
        the_Voice_호칭:
          type: string
          example: 김 대리님

    AnalyzeSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        user_wiki:
          type: object
          properties:
            user_id: { type: string }
            nickname_analysis: { $ref: '#/components/schemas/NicknameAnalysis' }
        meta:
          type: object
          properties:
            model: { type: string, example: mock }
            input_tokens: { type: integer }
            output_tokens: { type: integer }
            cost_usd: { type: number }

    ErrorResponse:
      type: object
      required: [success, error, code]
      properties:
        success: { type: boolean, example: false }
        error: { type: string }
        code:
          type: string
          enum:
            - INVALID_NICKNAME
            - INVALID_BODY
            - UNAUTHORIZED
            - RATE_LIMITED
            - LLM_ERROR
            - NO_WIKI
            - SERVER_ERROR

tags:
  - name: Health
    description: 워커 상태
  - name: Character
    description: 캐릭터 분석 + user_wiki
